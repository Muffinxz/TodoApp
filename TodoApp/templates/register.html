{% include 'layout.html' %}

<div class="auth-wrapper">
    <div class="auth-card auth-card-wide">
        <div class="auth-header">
            <h2>Create your account</h2>
            <p>Join TodoApp and start organizing your tasks beautifully</p>
        </div>

        <div class="auth-body">
            <form id="registerForm" method="post" action="/auth/">
                <div class="form-row-custom">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-control" name="email" autocomplete="email" required>
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" class="form-control" name="username" autocomplete="username" required>
                    </div>
                </div>

                <div class="form-row-custom">
                    <div class="form-group">
                        <label>First name</label>
                        <input type="text" class="form-control" name="first_name" autocomplete="given-name" required>
                    </div>
                    <div class="form-group">
                        <label>Last name</label>
                        <input type="text" class="form-control" name="last_name" autocomplete="family-name" required>
                    </div>
                </div>

                <div class="form-row-custom">
                    <div class="form-group">
                        <label>Role</label>
                        <input type="text" class="form-control" name="role" required>
                    </div>
                    <div class="form-group">
                        <label>Phone number</label>
                        <input type="text" class="form-control" name="phone_number" autocomplete="tel" required>
                    </div>
                </div>

                <div class="form-row-custom">
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-control" name="password" autocomplete="new-password" required>
                    </div>
                    <div class="form-group">
                        <label>Verify password</label>
                        <input type="password" class="form-control" name="password2" autocomplete="new-password" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">Create account</button>
            </form>
        </div>

        <div class="auth-footer">
            <span>Already have an account?</span>
            <a href="/auth/login-page">Login</a>
        </div>
    </div>
</div>
